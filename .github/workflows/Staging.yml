name: "staging-cicd"

on: workflow_dispatch
permissions:
  id-token: write
  contents: read
jobs:
  terraform-job:
    environment: dev
    runs-on: pkdg
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      
    - name: Install Terraform
      uses: little-core-labs/install-terraform@v2.0.0  
      with:
        version: 1.13.0
        
    - name: Azure Login
      uses: Azure/login@v3
      with:
        client-id: ba98cacc-0d74-4756-9101-cc3eda001026
        # TenantId of the Azure Service principal created.
        tenant-id: 01243cc1-e80d-488d-9e34-c0c5f65a9974
        # Azure subscriptionId
        subscription-id: b45fb524-5427-4292-b739-56b83ea60765

    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check
      continue-on-error: true
      working-directory: Environment/dev
      
    - name: Terraform init
      id: init
      run: terraform init
      continue-on-error: true
      working-directory: Environment/dev
    
    - name: Terraform validate
      id: validate
      run: terraform validate -no-color
      continue-on-error: true
      working-directory: Environment/dev

    - name: Terraform plan
      id: plan
      run: terraform plan -no-color -input=false
      continue-on-error: true
      working-directory: Environment/dev
        
      
    
