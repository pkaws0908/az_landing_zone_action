name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:

  terraform-plan:
    name: Terraform Plan (Feature Branch)
    runs-on: ubuntu-latest

    if: github.ref != 'refs/heads/main'

    defaults:
      run:
        working-directory: Environment/dev   # 👈 YOUR TERRAFORM PATH

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: Environment/dev/tfplan


  terraform-apply:
    name: Terraform Apply (Main Branch)
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: Environment/dev   # 👈 SAME PATH

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve